
name: Build EXE

on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt
      - run: pip install pyinstaller

      - run: pyinstaller --onefile --windowed --icon=app.ico --hidden-import=win32com.client gui.py

      - uses: actions/upload-artifact@v4
        with:
          name: exe
          path: dist/gui.exe
